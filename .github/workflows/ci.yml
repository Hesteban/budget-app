name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run pytest
        env:
          APP_ENV: test        # activates FakeRepository; no Supabase creds needed
        run: pytest tests/ -v --tb=short

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: test           # only run if unit tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt
          playwright install --with-deps chromium

      - name: Start Streamlit server (background)
        env:
          APP_ENV: test
        run: |
          streamlit run main.py \
            --server.port 8501 \
            --server.headless true \
            --browser.gatherUsageStats false &

      - name: Wait for Streamlit to be ready
        run: |
          python - <<'EOF'
          import urllib.request, time, sys
          url = "http://localhost:8501"
          for attempt in range(30):
              try:
                  urllib.request.urlopen(url, timeout=2)
                  print(f"Streamlit is up (attempt {attempt + 1})")
                  sys.exit(0)
              except Exception:
                  time.sleep(2)
          print("Streamlit did not start in time")
          sys.exit(1)
          EOF

      - name: Run Playwright E2E tests
        env:
          APP_ENV: test
          BASE_URL: http://localhost:8501
        run: pytest tests/e2e/ -v --tb=short -m e2e
